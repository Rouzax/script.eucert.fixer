site_name: EU Certification Fixer
site_url: https://rouzax.github.io/script.eucert.fixer/docs/
site_description: "EU Certification Fixer, automatic age rating backfill for your Kodi library"
repo_url: https://github.com/Rouzax/script.eucert.fixer
repo_name: Rouzax/script.eucert.fixer
edit_uri: edit/main/docs/

site_dir: build/docs

theme:
  name: material
  logo: assets/icon.png
  favicon: assets/icon.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Installation: installation.md
  - Configuration: configuration.md
  - How It Works: how-it-works.md
  - Rating Systems: rating-systems.md
  - Troubleshooting: troubleshooting.md
  - FAQ: faq.md

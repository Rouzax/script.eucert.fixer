# Pre-commit hooks for script.eucert.fixer.
#
# Prerequisite: pip install -r requirements-dev.txt   (hooks reuse those tools)
# Install:      pre-commit install && pre-commit install --hook-type pre-push
# Run on all:   pre-commit run --all-files
#
# These are `local` hooks on purpose: they reuse the exact tool versions pinned
# in requirements-dev.txt (so commits, pre-commit, and CI all run identical
# checks), and pyright sees the installed kodistubs. No external hook repos to
# SHA-pin as a result.

fail_fast: false

repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint + import sort)
        entry: ruff check --fix --force-exclude
        language: system
        types_or: [python, pyi]

      - id: py-compile
        name: python syntax check
        entry: python3 -m py_compile
        language: system
        types: [python]

      - id: pyright
        name: pyright (type check)
        entry: pyright
        language: system
        types: [python]
        pass_filenames: false

      - id: vulture
        name: vulture (dead code)
        entry: vulture
        language: system
        types: [python]
        pass_filenames: false

      # Slower: runs on `git push`, not on every commit.
      - id: pytest
        name: pytest
        entry: python3 -m pytest tests/ -q
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]

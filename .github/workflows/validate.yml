name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install kodistubs pyright pyflakes kodi-addon-checker requests pytest pytest-mock

      - name: Syntax check
        run: |
          find . -name "*.py" -not -path "*/__pycache__/*" -exec python3 -m py_compile {} \;

      - name: Pyflakes
        run: |
          pyflakes $(find . -name "*.py" -not -path "*/__pycache__/*")

      - name: Clean __pycache__
        run: find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

      - name: Pyright
        run: pyright

      - name: Tests
        run: python3 -m pytest tests/ -v

      - name: Kodi addon checker
        run: |
          mkdir -p /tmp/addon-check/script.eucert.fixer
          rsync -a \
            --exclude=tests --exclude=__pycache__ \
            --exclude=.git --exclude=.github \
            --exclude=docker --exclude=docs \
            --exclude=build --exclude=site \
            --exclude=_temp --exclude=.worktrees \
            --exclude=.ruff_cache --exclude=.pytest_cache \
            --exclude=CLAUDE.md --exclude=.claude \
            --exclude=.claudeignore --exclude=.mcp.json \
            --exclude=mkdocs.yml --exclude=pyrightconfig.json \
            --exclude=.pyflakes --exclude=.gitignore \
            --exclude=README.md --exclude=TODO.md --exclude=pytest.ini \
            . /tmp/addon-check/script.eucert.fixer/
          kodi-addon-checker --branch omega /tmp/addon-check
